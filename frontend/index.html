<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="DesiFriend AI - Your friendly AI companion supporting multiple Indian languages">
    <title>DesiFriend AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Navbar -->
    <header class="navbar">
        <h1 class="navbar-title">DesiFriend AI</h1>
        <div class="language-indicator" id="languageIndicator">
            <span id="detectedLanguage">English</span>
        </div>
    </header>

    <!-- Chat Messages Area -->
    <main class="chat-container" id="chatContainer">
        <div class="messages" id="messagesArea">
            <!-- Welcome message -->
            <div class="message ai-message">
                <div class="message-bubble">
                    <p>Hi! I'm DesiFriend AI. I can chat with you in Hindi, Kannada, Tamil, Telugu, Malayalam, Bengali, Marathi, Gujarati, Punjabi, and English. How can I help you today? 😊</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="input-container">
        <div class="input-wrapper">
            <button class="mic-button" id="micButton" title="Voice input">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            
            <input 
                type="text" 
                class="message-input" 
                id="messageInput" 
                placeholder="Type your message..."
                autocomplete="off"
            >
            
            <button class="send-button" id="sendButton" title="Send message">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        
        <!-- Recording indicator (hidden by default) -->
        <div class="recording-indicator" id="recordingIndicator" style="display: none;">
            <span class="recording-dot"></span>
            <span>Recording...</span>
        </div>
    </footer>

    <!-- Hidden audio element for playback -->
    <audio id="audioPlayer" style="display: none;"></audio>

    <!-- Loading indicator template (hidden) -->
    <template id="typingIndicatorTemplate">
        <div class="message ai-message typing-indicator">
            <div class="message-bubble">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="chat.js"></script>
    <script src="voice.js"></script>
</body>
</html>
